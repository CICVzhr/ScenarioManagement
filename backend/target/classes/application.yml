server:
  port: 8081

spring:
  application:
    name: scenario-management

  datasource:
    url: jdbc:h2:mem:scenario_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.example.scenario: DEBUG
    org.hibernate.SQL: DEBUG