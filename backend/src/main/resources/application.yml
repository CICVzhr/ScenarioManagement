server:
  port: 8081

spring:
  application:
    name: scenario-management

  datasource:
    url: jdbc:mysql://localhost:3306/scenario_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    com.example.scenario: DEBUG
    org.hibernate.SQL: DEBUG